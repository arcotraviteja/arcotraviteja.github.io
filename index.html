<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">
    <meta name="theme-color" content="#0F172A">
    <title>Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scroll-progress"></div>

    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="#hero" class="nav-brand" id="nav-brand">RT</a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="nav-menu"></ul>
        </div>
    </nav>

    <!-- Hero -->
    <section id="hero" class="hero-section">
        <div class="container">
            <div class="hero-inner">
                <div class="hero-text">
                    <p class="hero-greeting" id="hero-greeting"></p>
                    <h1 class="hero-name" id="hero-name"></h1>
                    <h2 class="hero-title" id="hero-title">
                        <span class="hero-title-prefix">&gt;</span>
                        <span id="hero-title-text"></span><span class="hero-cursor"></span>
                    </h2>
                    <p class="hero-tagline" id="hero-tagline"></p>
                    <p class="hero-description" id="hero-description"></p>
                    <div class="hero-cta" id="hero-cta"></div>
                    <div class="hero-social" id="hero-social"></div>
                </div>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
            <a href="#about" class="scroll-indicator" aria-label="Scroll down">
                <span>scroll</span>
                <i class="fas fa-chevron-down"></i>
            </a>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="section">
        <div class="container">
            <p class="section-eyebrow">01 — About</p>
            <h2 class="section-title" id="about-title">About</h2>
            <div class="about-content" id="about-content"></div>
            <div class="about-highlights" id="about-highlights"></div>
        </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section section-alt">
        <div class="container">
            <p class="section-eyebrow">02 — Experience</p>
            <h2 class="section-title" id="experience-title">Experience</h2>
            <p class="section-subtitle" id="experience-subtitle"></p>
            <div class="timeline" id="experience-timeline"></div>
        </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section">
        <div class="container">
            <p class="section-eyebrow">03 — Stack</p>
            <h2 class="section-title" id="skills-title">Skills</h2>
            <div class="skills-grid" id="skills-grid"></div>
        </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section section-alt">
        <div class="container">
            <p class="section-eyebrow">04 — Projects</p>
            <h2 class="section-title" id="work-title">Projects</h2>
            <p class="section-subtitle" id="work-subtitle"></p>
            <div class="work-grid" id="work-grid"></div>
        </div>
    </section>

    <!-- Education -->
    <section id="education" class="section">
        <div class="container">
            <p class="section-eyebrow">05 — Education</p>
            <h2 class="section-title" id="education-title">Education & Certifications</h2>
            <div class="education-grid">
                <div class="education-list" id="education-list"></div>
                <div class="cert-list" id="cert-list"></div>
            </div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section section-alt">
        <div class="container">
            <p class="section-eyebrow">06 — Contact</p>
            <h2 class="section-title" id="contact-title">Contact</h2>
            <p class="section-subtitle" id="contact-subtitle"></p>
            <div class="contact-info" id="contact-info"></div>
            <div class="contact-social" id="contact-social"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p id="footer-text"></p>
            <p id="footer-copyright"></p>
            <div id="footer-links"></div>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" aria-label="Back to top"><i class="fas fa-arrow-up"></i></button>
    <script src="assets/js/main.js"></script>
</body>
</html>
